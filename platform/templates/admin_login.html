<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
<div class="text-center mb-8"><h1 class="text-3xl font-bold text-primary">Admin Panel</h1><p class="text-gray-500">Manage lending operations</p></div>
<form method="POST" class="space-y-4">
<div><label class="block text-sm font-medium">Email</label><input type="email" name="email" required class="w-full mt-1 px-4 py-3 border rounded-xl"></div>
<div><label class="block text-sm font-medium">Password</label><input type="password" name="password" required class="w-full mt-1 px-4 py-3 border rounded-xl"></div>
<button type="submit" class="w-full bg-primary hover:bg-blue-900 text-white py-3 rounded-xl font-semibold">Sign In</button>
</form></div></body></html>
